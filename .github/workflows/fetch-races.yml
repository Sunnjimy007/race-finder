name: Weekly Race Cache Refresh

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  fetch-races:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        location: [Singapore, Australia]
      fail-fast: false   # Continue other locations even if one fails

    steps:
      - name: Fetch and cache races for ${{ matrix.location }}
        run: |
          echo "Fetching races for ${{ matrix.location }}..."
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d "{\"location\":\"${{ matrix.location }}\",\"distances\":[\"5K\",\"10K\",\"Half\",\"Full\",\"Ultra\",\"Fun Run\"],\"timeframe\":\"next 12 months\"}" \
            --max-time 90 \
            "https://racefinder.sanjiv-shah.com/api/search")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP status: $http_code"
          echo "Response: $body"

          if [ "$http_code" != "200" ]; then
            echo "Failed for ${{ matrix.location }} with status $http_code"
            exit 1
          fi

          count=$(echo "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('races',[])))" 2>/dev/null || echo "unknown")
          echo "Races returned: $count"
